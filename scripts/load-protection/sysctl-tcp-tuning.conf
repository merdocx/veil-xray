# TCP tuning for veil-xray (VLESS :443, many concurrent sessions)
# Install: cp to /etc/sysctl.d/99-veil-tcp.conf && sysctl --system

# SYN backlog (was 128 — too low for VPN peaks)
net.ipv4.tcp_max_syn_backlog = 8192
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384

# Faster cleanup of half-closed sockets (FIN-WAIT pile-up)
net.ipv4.tcp_fin_timeout = 30

# Orphan limit (kernel log "TCP: too many orphaned sockets" under VPN churn)
net.ipv4.tcp_max_orphans = 16384

# Orphan / keepalive (defaults often too long under churn)
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Moderate swappiness on VPN host (2–4 GiB)
vm.swappiness = 10
