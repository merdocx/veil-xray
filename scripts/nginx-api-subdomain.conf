# Конфигурация Nginx для поддомена API Veil Xray
# ШАБЛОН: используется скриптом setup_api_subdomain.sh (подстановка api.your-domain.example)
#
# Ручная настройка:
#   1. Замените api.your-domain.example на ваш поддомен
#   2. Замените пути к SSL-сертификатам
#   3. allow <admin-ip-1>, <admin-ip-2> — IP veilbot / админ-серверов

server {
    listen 80;
    listen [::]:80;
    server_name api.your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.your-domain.example;

    ssl_certificate /etc/letsencrypt/live/api.your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.example/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/veil-xray-api-access.log;
    error_log /var/log/nginx/veil-xray-api-error.log;

    location / {
        allow <admin-ip-1>;
        allow <admin-ip-2>;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /health {
        allow <admin-ip-1>;
        allow <admin-ip-2>;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8000/;
        access_log off;
    }
}
