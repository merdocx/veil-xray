# API на отдельном HTTPS-порту, когда :443 занят Xray
# Замените <VPN_PUBLIC_IP> и <admin-ip-*>

server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name <VPN_PUBLIC_IP> _;

    ssl_certificate /etc/letsencrypt/live/<VPN_PUBLIC_IP>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<VPN_PUBLIC_IP>/privkey.pem;

    location / {
        allow <admin-ip-1>;
        allow <admin-ip-2>;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        allow <admin-ip-1>;
        allow <admin-ip-2>;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8000/;
        access_log off;
    }
}
