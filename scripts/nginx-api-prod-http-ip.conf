# Пример прод-конфига: API по HTTP на :80 при занятом :443 (Xray).
# Установка: cp → /etc/nginx/sites-available/veil-xray-api, ln -s sites-enabled/, nginx -t && systemctl reload nginx
# Подставьте server_name под DOMAIN из .env

server {
    listen 80;
    listen [::]:80;
    server_name 193.124.65.182 _;

    access_log /var/log/nginx/veil-xray-api-access.log;
    error_log /var/log/nginx/veil-xray-api-error.log;

    location / {
        allow 89.110.76.53;
        allow 91.184.245.209;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /health {
        allow 89.110.76.53;
        allow 91.184.245.209;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000/;
        access_log off;
    }
}
